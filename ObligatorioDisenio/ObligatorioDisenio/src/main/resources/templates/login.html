<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Carreras de Caballos — Iniciar sesión</title>
    <link rel="stylesheet" href="/login.css" />
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Sistema de Carreras de Caballos</h1>
                <p class="login-subtitle">Ingresá tus credenciales para continuar</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="nombreUsuario">Usuario</label>
                    <input
                        type="text"
                        id="nombreUsuario"
                        name="nombreUsuario"
                        placeholder="Nombre de usuario"
                        autocomplete="username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Contraseña"
                        autocomplete="current-password"
                        required
                    />
                </div>

                <p id="mensaje" class="mensaje" aria-live="polite"></p>

                <button type="submit" id="btnLogin" class="btn-login">Ingresar</button>
            </form>
        </div>
    </main>

    <script type="module">
        import dispatcher from '../static/CommandDispatcher.js';

        /* ── Elementos del DOM ── */
        const form          = document.getElementById('loginForm');
        const inputUsuario  = document.getElementById('nombreUsuario');
        const inputPassword = document.getElementById('password');
        const mensaje       = document.getElementById('mensaje');

        /* ── Registro de vista ── */
        const view = dispatcher.registerView('login', {
            urlInicio: '/auth/login'
        });

        /* ── Handlers: comandos enviados por el presentador ── */
        view.handler('accesoPermitido', () => {
            redirigirMenu();
        });

        view.handler('mensajeError', (texto) => {
            mostrarError(texto);
        });

        /* ── Inicio ── */
        dispatcher.startView(view);

        /* ── Acción del formulario ── */
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            enviarLogin();
        });

        /* ── Helpers ── */
        function enviarLogin() {
            limpiarMensaje();
            const params = {
                nombreUsuario: inputUsuario.value.trim(),
                password:      inputPassword.value
            };
            dispatcher.submit('/login', params);
        }

        function mostrarError(texto) {
            mensaje.textContent = texto;
            mensaje.className = 'mensaje mensaje--error mensaje--visible';
        }

        function limpiarMensaje() {
            mensaje.textContent = '';
            mensaje.className = 'mensaje';
        }

        function redirigirMenu() {
            window.location.href = '/menu.html';
        }
    </script>
</body>
</html>
